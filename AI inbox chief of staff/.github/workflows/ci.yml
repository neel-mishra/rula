name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "AI inbox chief of staff/**"
  pull_request:
    branches: [main]
    paths:
      - "AI inbox chief of staff/**"

defaults:
  run:
    working-directory: "AI inbox chief of staff"

jobs:
  phase-smoke:
    name: Phase 4b/5 Smoke Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install poetry==1.8.2 && poetry install --no-root
      - name: Run auth/mailbox/queue smoke tests
        env:
          APP_ENV: dev
          APP_SECRET_KEY: "test_secret_key_minimum_32_characters_here"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/15"
          TOKEN_ENCRYPTION_KEY: ""
          ANTHROPIC_API_KEY: "test_key"
          OPENAI_API_KEY: "test_key"
        run: |
          poetry run pytest \
            tests/integration/test_auth_and_mailbox_connect_api.py \
            tests/integration/test_phase5_sandbox_smoke.py \
            tests/unit/test_queue_backend.py \
            -v --tb=short

  lint:
    name: Backend Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install poetry==1.8.2 && poetry install --no-root
      - name: Ruff lint
        run: poetry run ruff check .
      - name: Black format check
        run: poetry run black --check .
      - name: Mypy type check
        run: poetry run mypy api/ core/ orchestrator/ subagents/ workers/ --ignore-missing-imports

  test-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install poetry==1.8.2 && poetry install --no-root
      - name: Run unit tests (SQLite)
        env:
          APP_ENV: dev
          APP_SECRET_KEY: "test_secret_key_minimum_32_characters_here"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/15"
          TOKEN_ENCRYPTION_KEY: ""
          ANTHROPIC_API_KEY: "test_key"
          OPENAI_API_KEY: "test_key"
        run: poetry run pytest tests/unit tests/safety -v --tb=short

  test-integration:
    name: Backend Integration Tests (Postgres + pgvector)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: inbox_test
          POSTGRES_USER: inbox_user
          POSTGRES_PASSWORD: inbox_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_ENV: dev
      APP_SECRET_KEY: "test_secret_key_minimum_32_characters_here"
      DATABASE_URL: "postgresql+asyncpg://inbox_user:inbox_pass@localhost:5432/inbox_test"
      REDIS_URL: "redis://localhost:6379/0"
      TOKEN_ENCRYPTION_KEY: ""
      ANTHROPIC_API_KEY: "test_key"
      OPENAI_API_KEY: "test_key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install poetry==1.8.2 && poetry install --no-root
      - name: Run all tests against Postgres
        run: poetry run pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing --tb=short
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: "AI inbox chief of staff/coverage.xml"

  frontend:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "AI inbox chief of staff/frontend/app"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "AI inbox chief of staff/frontend/app/package-lock.json"
      - name: Install deps
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npx next lint
      - name: Build
        run: npx next build

  deployment-artifacts:
    name: Split-host deployment artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify MVP deployment files exist
        run: |
          test -f "AI inbox chief of staff/docs/deployment-vercel-render.md"
          test -f "AI inbox chief of staff/docs/deployment-inputs-checklist.md"
          test -f "AI inbox chief of staff/docs/launch-blockers-execution.md"
          test -f "AI inbox chief of staff/render.yaml"
          test -f "AI inbox chief of staff/frontend/app/.env.example"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Bandit SAST
        uses: jpetrucciani/bandit-check@main
        with:
          path: "AI inbox chief of staff"
      - name: Dependency audit
        run: pip install pip-audit && pip-audit -r "AI inbox chief of staff/requirements.txt" || true

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test-integration, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/inbox-github-deploy
          aws-region: us-east-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push API image
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/inbox-api:${{ github.sha }}"
          docker build -f "AI inbox chief of staff/infra/docker/Dockerfile.api" \
            -t "$IMAGE" "AI inbox chief of staff"
          docker push "$IMAGE"
      - name: Build and push Worker image
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/inbox-worker:${{ github.sha }}"
          docker build -f "AI inbox chief of staff/infra/docker/Dockerfile.worker" \
            -t "$IMAGE" "AI inbox chief of staff"
          docker push "$IMAGE"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-image]
    environment: staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/inbox-github-deploy
          aws-region: us-east-1
      - name: Run DB migrations
        run: |
          aws ecs run-task \
            --cluster inbox-staging \
            --task-definition inbox-migrate \
            --overrides '{"containerOverrides":[{"name":"migrate","command":["alembic","upgrade","head"]}]}'
      - name: Deploy API to ECS
        run: |
          aws ecs update-service \
            --cluster inbox-staging \
            --service inbox-api \
            --force-new-deployment
      - name: Deploy Worker to ECS
        run: |
          aws ecs update-service \
            --cluster inbox-staging \
            --service inbox-worker \
            --force-new-deployment
      - name: Smoke test staging
        run: |
          sleep 30
          curl -f https://api.staging.inbox.internal/health/ || exit 1
